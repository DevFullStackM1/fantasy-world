openapi: 3.1.1
info:
  title: Aventurier API
  version: 1.0.0
  description: API pour gérer des aventuriers

tags:
  - name: Aventurier
    description: Opérations liées aux aventuriers
  - name: Auth
    description: Opérations d'authentification
  - name: Competence
    description: Opérations liées aux compétences

servers:
  - url: http://localhost:8080

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      summary: Inscription d'un utilisateur
      description: Permet de créer un utilisateur. Rôle requis -> PUBLIC
      operationId: registerUser
      security: []
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Utilisateur créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: Conflict - Utilisateur déjà existant
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /auth/login:
    post:
      summary: Connexion d'un utilisateur
      description: Permet de connecter un utilisateur. Rôle requis -> PUBLIC
      operationId: loginUser
      security: []
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Utilisateur connecté
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /auth/logout:
    post:
      summary: Déconnexion d'un utilisateur
      description: Permet de déconnecter un utilisateur authentifié. Rôle requis -> VIEWER
      operationId: logoutUser
      tags:
        - Auth
      responses:
        '204':
          description: Utilisateur déconnecté
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /api/v1/aventuriers:
    get:
      summary: Liste tous les aventuriers
      description: Retourne la liste des aventuriers. Rôle requis -> VIEWER
      operationId: getAllAventuriers
      tags:
        - Aventurier
      responses:
        '200':
          description: Liste des aventuriers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Aventurier'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

    post:
      summary: Crée un nouvel aventurier
      description: Crée un nouvel aventurier. Rôle requis -> ADMIN
      operationId: createAventurier
      tags:
        - Aventurier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AventurierCreate'
      responses:
        '201':
          description: Aventurier créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Aventurier'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /api/v1/aventuriers/{id}:
    get:
      summary: Récupère un aventurier par son identifiant
      description: Retourne le détail d'un aventurier. Rôle requis -> VIEWER
      operationId: getAventurierById
      tags:
        - Aventurier
      parameters:
        - name: id
          in: path
          required: true
          description: Identifiant de l'aventurier
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Aventurier trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Aventurier'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

    patch:
      summary: Met à jour partiellement un aventurier
      description: Met à jour un aventurier. Rôle requis -> ADMIN
      operationId: updateAventurier
      tags:
        - Aventurier
      parameters:
        - name: id
          in: path
          required: true
          description: Identifiant de l'aventurier
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AventurierUpdate'
      responses:
        '200':
          description: Aventurier mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Aventurier'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: Conflict - Violation de règle métier (ex. niveau)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

    delete:
      summary: Supprime un aventurier
      description: Supprime un aventurier. Rôle requis -> ADMIN
      operationId: deleteAventurier
      tags:
        - Aventurier
      parameters:
        - name: id
          in: path
          required: true
          description: Identifiant de l'aventurier
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Aventurier supprimé
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /api/v1/competences:
    get:
      summary: Liste toutes les compétences
      description: Retourne la liste des compétences. Rôle requis -> VIEWER
      operationId: getAllCompetences
      tags:
        - Competence
      responses:
        '200':
          description: Liste des compétences
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Competence'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

    post:
      summary: Crée une nouvelle compétence
      description: Crée une nouvelle compétence. Rôle requis -> ADMIN
      operationId: createCompetence
      tags:
        - Competence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompetenceCreate'
      responses:
        '201':
          description: Compétence créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Competence'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: Conflict - Violation de règle métier (ex. nom unique, prérequis incohérents)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /api/v1/competences/{id}:
    get:
      summary: Récupère une compétence par son identifiant
      description: Retourne le détail d'une compétence. Rôle requis -> VIEWER
      operationId: getCompetenceById
      tags:
        - Competence
      parameters:
        - name: id
          in: path
          required: true
          description: Identifiant de la compétence
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Compétence trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Competence'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

    put:
      summary: Met à jour une compétence
      description: Met à jour une compétence. Rôle requis -> ADMIN
      operationId: updateCompetence
      tags:
        - Competence
      parameters:
        - name: id
          in: path
          required: true
          description: Identifiant de la compétence
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompetenceUpdate'
      responses:
        '200':
          description: Compétence mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Competence'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: Conflict - Violation de règle métier (ex. invalide des aventuriers existants)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

    delete:
      summary: Supprime une compétence
      description: Supprime une compétence. Rôle requis -> ADMIN
      operationId: deleteCompetence
      tags:
        - Competence
      parameters:
        - name: id
          in: path
          required: true
          description: Identifiant de la compétence
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Compétence supprimée
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: Conflict - Violation de règle métier (ex. compétence requise par une autre)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /api/v1/aventuriers/{id}/competences:
    get:
      summary: Liste les compétences d'un aventurier
      description: Retourne les compétences possédées par un aventurier. Rôle requis -> VIEWER
      operationId: getCompetencesByAventurierId
      tags:
        - Aventurier
        - Competence
      parameters:
        - name: id
          in: path
          required: true
          description: Identifiant de l'aventurier
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Liste des compétences de l'aventurier
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Competence'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /api/v1/aventuriers/{id}/competences/disponibles:
    get:
      summary: Liste les compétences disponibles pour un aventurier
      description: Retourne les compétences accessibles (prérequis remplis et non déjà possédées). Rôle requis -> VIEWER
      operationId: getCompetencesDisponiblesByAventurierId
      tags:
        - Aventurier
        - Competence
      parameters:
        - name: id
          in: path
          required: true
          description: Identifiant de l'aventurier
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Liste des compétences disponibles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Competence'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /api/v1/aventuriers/{id}/competences/{cId}:
    post:
      summary: Attribue une compétence à un aventurier
      description: Attribue une compétence si les prérequis sont respectés. Rôle requis -> ADMIN
      operationId: addCompetenceToAventurier
      tags:
        - Aventurier
        - Competence
      parameters:
        - name: id
          in: path
          required: true
          description: Identifiant de l'aventurier
          schema:
            type: integer
            format: int64
        - name: cId
          in: path
          required: true
          description: Identifiant de la compétence
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Compétence attribuée
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: Conflict - Violation d'invariant métier (prérequis non remplis)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

    delete:
      summary: Retire une compétence d'un aventurier
      description: Retire une compétence si elle n'est pas prérequis d'une autre déjà possédée. Rôle requis -> ADMIN
      operationId: removeCompetenceFromAventurier
      tags:
        - Aventurier
        - Competence
      parameters:
        - name: id
          in: path
          required: true
          description: Identifiant de l'aventurier
          schema:
            type: integer
            format: int64
        - name: cId
          in: path
          required: true
          description: Identifiant de la compétence
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Compétence retirée
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: Conflict - Violation d'invariant métier (compétence requise par une autre possédée)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /api/v1/competences/{id}/aventuriers:
    get:
      summary: Liste les aventuriers possédant une compétence
      description: Retourne la liste des aventuriers qui possèdent la compétence. Rôle requis -> VIEWER
      operationId: getAventuriersByCompetenceId
      tags:
        - Aventurier
        - Competence
      parameters:
        - name: id
          in: path
          required: true
          description: Identifiant de la compétence
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Liste des aventuriers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AventurierRef'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ProblemDetail:
      type: object
      description: RFC 9457 Problem Detail
      properties:
        type:
          type: string
          format: uri
          description: URI identifiant le type de problème
        title:
          type: string
          description: Résumé court du problème
        status:
          type: integer
          format: int32
          description: Code HTTP
        detail:
          type: string
          description: Explication détaillée du problème
        instance:
          type: string
          format: uri
          description: URI identifiant l'occurrence du problème

    Classe:
      type: string
      description: Classe de l'aventurier
      enum:
        - MAGE
        - GUERRIER
        - ARCHER
        - RÔDEUR
        - PRÊTRE
        - CHANTEUR
        - NÉGATEUR
        - SORCIER
        - PALADIN
        - BARD

    Caracteristique:
      type: string
      description: Caractéristique d'un aventurier
      enum:
        - PHYSIQUE
        - MENTAL
        - PERCEPTION

    CaracteristiqueMin:
      type: object
      description: Prérequis sur une caractéristique (valeur minimale)
      properties:
        caracteristique:
          $ref: '#/components/schemas/Caracteristique'
        valeur:
          type: integer
          format: int32
      required:
        - caracteristique
        - valeur

    PrerequisCompetence:
      type: object
      description: Prérequis d'une compétence (tous optionnels)
      properties:
        classeRequise:
          $ref: '#/components/schemas/Classe'
        niveauMinimum:
          type: integer
          format: int32
          minimum: 1
        caracteristiquesMin:
          $ref: '#/components/schemas/CaracteristiqueMin'
        competencesRequises:
          type: array
          description: Liste d'identifiants de compétences requises (déjà connues)
          items:
            type: string
            format: uuid

    CompetenceRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Identifiant unique de la compétence (UUID)
      required:
        - id

    CompetenceEditableAttributes:
      type: object
      description: Champs éditables d'une compétence
      properties:
        nom:
          type: string
          description: Nom unique de la compétence
        description:
          type: string
          description: Description de la compétence
        prerequis:
          $ref: '#/components/schemas/PrerequisCompetence'

    Competence:
      allOf:
        - $ref: '#/components/schemas/CompetenceRef'
        - $ref: '#/components/schemas/CompetenceEditableAttributes'
        - type: object
          required:
            - id
            - nom

    CompetenceCreate:
      description: Données pour créer une compétence. Si les prérequis sont tous null/vide, la compétence est accessible à tous (cas valide).
      allOf:
        - $ref: '#/components/schemas/CompetenceEditableAttributes'
        - type: object
          required:
            - nom

    CompetenceUpdate:
      description: Données pour mettre à jour une compétence. La mise à jour ne doit pas invalider des aventuriers qui la possèdent déjà.
      allOf:
        - $ref: '#/components/schemas/CompetenceEditableAttributes'
        - type: object
          required:
            - nom

    AventurierRef:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Identifiant unique de l'aventurier (auto-incrémenté)
      required:
        - id

    AventurierEditableAttributes:
      type: object
      description: Champs éditables d'un aventurier (tous optionnels pris isolément)
      properties:
        nom:
          type: string
          description: Nom de l'aventurier
        description:
          type: string
          description: Description de l'aventurier
        physique:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
          description: Note de physique sur 100
        mental:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
          description: Note de mental sur 100
        perception:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
          description: Note de perception sur 100
        niveau:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
          description: Niveau global sur 100
        classe:
          $ref: '#/components/schemas/Classe'

    Aventurier:
      allOf:
        - $ref: '#/components/schemas/AventurierRef'
        - $ref: '#/components/schemas/AventurierEditableAttributes'
        - type: object
          required:
            - id
            - nom
            - physique
            - mental
            - perception
            - niveau
            - classe

    AventurierCreate:
      description: Données pour créer un aventurier. Le niveau est ignoré (toujours initialisé à 1).
      allOf:
        - $ref: '#/components/schemas/AventurierEditableAttributes'
        - type: object
          required:
            - nom
            - physique
            - mental
            - perception
            - classe

    AventurierUpdate:
      description: Champs modifiables d'un aventurier (tous optionnels). Le niveau ne peut jamais descendre et ne peut monter que de 1 à la fois.
      allOf:
        - $ref: '#/components/schemas/AventurierEditableAttributes'

    RegisterRequest:
      type: object
      description: Données nécessaires pour inscrire un utilisateur
      properties:
        username:
          type: string
          description: Nom d'utilisateur unique
        password:
          type: string
          format: password
          description: Mot de passe de l'utilisateur
      required:
        - username
        - password

    LoginRequest:
      type: object
      description: Données nécessaires pour connecter un utilisateur
      properties:
        username:
          type: string
          description: Nom d'utilisateur
        password:
          type: string
          format: password
          description: Mot de passe
      required:
        - username
        - password

    AuthResponse:
      type: object
      description: Réponse d'authentification
      properties:
        accessToken:
          type: string
          description: Jeton d'accès JWT
      required:
        - accessToken
