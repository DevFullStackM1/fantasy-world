openapi: 3.1.1
info:
  title: Aventurier API
  version: 1.0.0
  description: API pour gérer des aventuriers

tags:
  - name: Aventurier
    description: Opérations liées aux aventuriers
  - name: Auth
    description: Opérations d'authentification

servers:
  - url: http://localhost:8080

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      summary: Inscription d'un utilisateur
      description: Permet de créer un utilisateur. Rôle requis -> PUBLIC
      operationId: registerUser
      security: []
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Utilisateur créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: Conflict - Utilisateur déjà existant
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /auth/login:
    post:
      summary: Connexion d'un utilisateur
      description: Permet de connecter un utilisateur. Rôle requis -> PUBLIC
      operationId: loginUser
      security: []
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Utilisateur connecté
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /auth/logout:
    post:
      summary: Déconnexion d'un utilisateur
      description: Permet de déconnecter un utilisateur authentifié. Rôle requis -> VIEWER
      operationId: logoutUser
      tags:
        - Auth
      responses:
        '204':
          description: Utilisateur déconnecté
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /api/v1/aventuriers:
    get:
      summary: Liste tous les aventuriers
      description: Retourne la liste des aventuriers. Rôle requis -> VIEWER
      operationId: getAllAventuriers
      tags:
        - Aventurier
      responses:
        '200':
          description: Liste des aventuriers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Aventurier'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

    post:
      summary: Crée un nouvel aventurier
      description: Crée un nouvel aventurier. Rôle requis -> ADMIN
      operationId: createAventurier
      tags:
        - Aventurier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AventurierCreate'
      responses:
        '201':
          description: Aventurier créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Aventurier'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /api/v1/aventuriers/{id}:
    get:
      summary: Récupère un aventurier par son identifiant
      description: Retourne le détail d'un aventurier. Rôle requis -> VIEWER
      operationId: getAventurierById
      tags:
        - Aventurier
      parameters:
        - name: id
          in: path
          required: true
          description: Identifiant de l'aventurier
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Aventurier trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Aventurier'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

    patch:
      summary: Met à jour partiellement un aventurier
      description: Met à jour un aventurier. Rôle requis -> ADMIN
      operationId: updateAventurier
      tags:
        - Aventurier
      parameters:
        - name: id
          in: path
          required: true
          description: Identifiant de l'aventurier
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AventurierUpdate'
      responses:
        '200':
          description: Aventurier mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Aventurier'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: Conflict - Violation de règle métier (ex. niveau)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

    delete:
      summary: Supprime un aventurier
      description: Supprime un aventurier. Rôle requis -> ADMIN
      operationId: deleteAventurier
      tags:
        - Aventurier
      parameters:
        - name: id
          in: path
          required: true
          description: Identifiant de l'aventurier
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Aventurier supprimé
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ProblemDetail:
      type: object
      description: RFC 9457 Problem Detail
      properties:
        type:
          type: string
          format: uri
          description: URI identifiant le type de problème
        title:
          type: string
          description: Résumé court du problème
        status:
          type: integer
          format: int32
          description: Code HTTP
        detail:
          type: string
          description: Explication détaillée du problème
        instance:
          type: string
          format: uri
          description: URI identifiant l'occurrence du problème

    Classe:
      type: string
      description: Classe de l'aventurier
      enum:
        - MAGE
        - GUERRIER
        - ARCHER
        - RÔDEUR
        - PRÊTRE
        - CHANTEUR
        - NÉGATEUR
        - SORCIER
        - PALADIN
        - BARD

    AventurierRef:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Identifiant unique de l'aventurier (auto-incrémenté)
      required:
        - id

    AventurierEditableAttributes:
      type: object
      description: Champs éditables d'un aventurier (tous optionnels pris isolément)
      properties:
        nom:
          type: string
          description: Nom de l'aventurier
        description:
          type: string
          description: Description de l'aventurier
        physique:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
          description: Note de physique sur 100
        mental:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
          description: Note de mental sur 100
        perception:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
          description: Note de perception sur 100
        niveau:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
          description: Niveau global sur 100
        classe:
          $ref: '#/components/schemas/Classe'

    Aventurier:
      allOf:
        - $ref: '#/components/schemas/AventurierRef'
        - $ref: '#/components/schemas/AventurierEditableAttributes'
        - type: object
          required:
            - id
            - nom
            - physique
            - mental
            - perception
            - niveau
            - classe

    AventurierCreate:
      description: Données pour créer un aventurier. Le niveau est ignoré (toujours initialisé à 1).
      allOf:
        - $ref: '#/components/schemas/AventurierEditableAttributes'
        - type: object
          required:
            - nom
            - physique
            - mental
            - perception
            - classe

    AventurierUpdate:
      description: Champs modifiables d'un aventurier (tous optionnels). Le niveau ne peut jamais descendre et ne peut monter que de 1 à la fois.
      allOf:
        - $ref: '#/components/schemas/AventurierEditableAttributes'

    RegisterRequest:
      type: object
      description: Données nécessaires pour inscrire un utilisateur
      properties:
        username:
          type: string
          description: Nom d'utilisateur unique
        password:
          type: string
          format: password
          description: Mot de passe de l'utilisateur
      required:
        - username
        - password

    LoginRequest:
      type: object
      description: Données nécessaires pour connecter un utilisateur
      properties:
        username:
          type: string
          description: Nom d'utilisateur
        password:
          type: string
          format: password
          description: Mot de passe
      required:
        - username
        - password

    AuthResponse:
      type: object
      description: Réponse d'authentification
      properties:
        accessToken:
          type: string
          description: Jeton d'accès JWT
      required:
        - accessToken
